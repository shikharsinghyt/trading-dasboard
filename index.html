<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TradeX Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #0b0f1a;
      color: white;
    }

    /* Sidebar */
    .sidebar {
      width: 220px;
      height: 100vh;
      position: fixed;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border-right: 1px solid rgba(255,255,255,0.1);
      padding: 20px;
    }

    .sidebar h2 {
      color: #00ff99;
    }

    .menu {
      margin-top: 30px;
    }

    .menu div {
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    .menu div:hover {
      background: rgba(0,255,150,0.2);
      transform: translateX(5px);
    }

    /* Main */
    .main {
      margin-left: 240px;
      padding: 20px;
    }

    /* Cards */
    .cards {
      display: flex;
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      flex: 1;
      padding: 20px;
      border-radius: 15px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-10px) scale(1.02);
      box-shadow: 0 20px 40px rgba(0,255,150,0.3);
    }

    /* Button */
    .btn {
      padding: 10px 20px;
      background: linear-gradient(45deg, #00ff99, #00ccff);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 10px;
    }

  </style>
</head>

<body>

  <div class="sidebar">
    <h2>TradeX</h2>

    <div class="menu">
      <div>Dashboard</div>
      <div>Screener</div>
      <div>Watchlist</div>
      <div>Settings</div>
    </div>
  </div>

  <div class="main">
    <h1>Intraday Screener Dashboard 🚀</h1>

    <div class="cards">
      <div class="card">
        <h3>ORB Breakout</h3>
        <p>Opening Range Breakout Strategy</p>
        <button class="btn">Run Screener</button>
      </div>

      <div class="card">
        <h3>VWAP Failure</h3>
        <p>VWAP + 9 EMA Setup</p>
        <button class="btn">Run Screener</button>
      </div>

      <div class="card">
        <h3>Demand Zone</h3>
        <p>SMC Zone Entry</p>
        <button class="btn">Run Screener</button>
      </div>
    </div>

  </div>

</body>
</html>
